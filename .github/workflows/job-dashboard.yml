name: COSIMA Recipes Dashboard

on:
  push:
    branches:
      - main
    paths:
      - dashboard/**
      - scripts/build_dashboard_data.py
      - .github/configs/cosima-all-recipes.*
      - .github/workflows/job-dashboard.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  deploy-dashboard:
    name: Build and deploy static dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Build dashboard data from recipe manifest
        run: python3 scripts/build_dashboard_data.py

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
